services:
  cleartax_nodejs:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: cleartax_nodejs
    ports:
      - "3001:3000"
    volumes:
      - ./server/src:/app/src
      - ./server/package.json:/app/package.json
      - ./.env:/app/.env
    command: node --watch --experimental-strip-types --env-file=./.env src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      aistor:
        condition: service_started
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - JWT_SECRET=${JWT_SECRET}

  cleartax_react:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: cleartax_react
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
    stdin_open: true
    tty: true
    depends_on:
      - cleartax_nodejs

  postgres:
    image: postgres:16-alpine
    container_name: cleartax_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: cleartax_pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - postgres
    restart: always

  aistor:
    image: quay.io/minio/aistor/minio:latest
    container_name: cleartax_aistor
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/mnt/data
      - ./minio/minio.license/minio.license:/minio.license
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /mnt/data --console-address ":9001" --license /minio.license
    restart: always

volumes:
  postgres_data: